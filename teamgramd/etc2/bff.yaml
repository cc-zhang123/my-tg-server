Name: bff.bff
ListenOn: 0.0.0.0:20010
Etcd:
  Hosts:
    - etcd:2379
  Key: bff.bff
Timeout: 0
Log:
  ServiceName: bff.bff
  #Mode: file
  #Path: ../logs/bff
  Level: info
  DisableStat: true
#监控
Prometheus:
  Host: 0.0.0.0
  Port: 20011
  Path: /metrics
#链路追踪
Telemetry:
  Name: bff.bff
  Endpoint: jaeger:4317
  Sampler: 1.0
  Batcher: otlpgrpc
  
KV:
  - Host: redis:6379

Code:
  # Name: "none" 走开发旁路, 任意手机号 + 验证码 12345 即可登录
  # Name: "aliyun" 走阿里云短信
  Name: "aliyun"
  SendCodeUrl: ""                          # 可选, 默认 https://dysmsapi.aliyuncs.com/
  VerifyCodeUrl: ""
  Key: "TODO_FILL_ALIYUN_ACCESS_KEY_ID"    # AccessKeyId
  Secret: "TODO_FILL_ALIYUN_ACCESS_SECRET" # AccessKeySecret
  RegionId: "cn-hangzhou"
  SignName: "TODO_FILL_SIGN_NAME"          # 阿里云短信签名 (控制台已审核通过)
  TemplateCode: "TODO_FILL_TEMPLATE_CODE"  # 模板 CODE, 形如 SMS_xxxxxxxx, 模板内需含 ${code} 占位符

BizServiceClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.biz_service
AuthSessionClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.authsession
MediaClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.media
  Timeout: 0
IdgenClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.idgen
MsgClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: messenger.msg
  Timeout: 0
DfsClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.dfs
  Timeout: 0
StatusClient:
  Etcd:
    Hosts:
      - etcd:2379
    Key: service.status

SyncClient:
  Topic:   "Sync-T"
  Brokers:
    - kafka:9092
